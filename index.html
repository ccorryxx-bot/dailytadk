<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Daily Task</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Myanmar:wght@300;400;600&family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#08090d;
  --s1:#0f1117;
  --s2:#161820;
  --b:#ffffff0f;
  --bh:#ffffff1e;
  --g1:#00f5a0;--g2:#00d9f5;--g3:#00a8ff;
  --a1:#ff6b35;--a2:#ffb347;
  --tx:#f0f2f5;--mu:#5c6470;--mu2:#8892a0;
  --done:rgba(0,245,160,.05);
  --r:16px;
}
html{scroll-behavior:smooth;-webkit-overflow-scrolling:touch;text-size-adjust:100%}
body{
  background:var(--bg);color:var(--tx);
  font-family:'Noto Sans Myanmar',sans-serif;
  min-height:100vh;display:flex;justify-content:center;
  padding:0 14px 80px;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:contain;
  background-image:
    radial-gradient(ellipse 60% 40% at 15% 5%,rgba(0,245,160,.06) 0%,transparent 70%),
    radial-gradient(ellipse 50% 35% at 85% 90%,rgba(0,217,245,.05) 0%,transparent 70%);
}

/* ── CANVAS ── */
#bgC,#ocC{position:fixed;top:0;left:0;width:100%;height:170px;pointer-events:none;z-index:9}
#bgC{z-index:8}

/* ── WRAP ── */
.w{width:100%;max-width:520px;padding-top:50px;animation:up .6s cubic-bezier(.16,1,.3,1) both}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ── HEADER ── */
header{text-align:center;margin-bottom:32px;padding-top:120px;position:relative;z-index:10}
.htag{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.18em;color:var(--mu);
  text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px}
.htag::before,.htag::after{content:'';height:1px;width:28px;background:linear-gradient(90deg,transparent,var(--mu))}
h1{font-family:'Syne',sans-serif;font-size:2.4rem;font-weight:800;line-height:1.05;
  background:linear-gradient(135deg,var(--g1) 0%,var(--g2) 50%,var(--g3) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:hglow 3s ease-in-out infinite alternate;letter-spacing:-.01em}
@keyframes hglow{
  0%{filter:drop-shadow(0 0 8px rgba(0,245,160,.5)) drop-shadow(0 0 24px rgba(0,245,160,.25))}
  50%{filter:drop-shadow(0 0 4px rgba(0,217,245,.3)) drop-shadow(0 0 16px rgba(0,217,245,.15))}
  100%{filter:drop-shadow(0 0 12px rgba(0,168,255,.6)) drop-shadow(0 0 32px rgba(0,168,255,.3))}
}
.hsub{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--mu);letter-spacing:.1em;margin-top:8px}

/* ── TABS — 2026 pill style ── */
.tabs{display:flex;gap:6px;margin-bottom:24px;background:var(--s1);
  border-radius:100px;padding:5px;border:1px solid var(--b);position:relative;z-index:10}
.tab{flex:1;padding:11px 8px;border:none;border-radius:100px;background:transparent;
  color:var(--mu);font-family:'Noto Sans Myanmar',sans-serif;font-size:.84rem;font-weight:600;
  cursor:pointer;transition:all .2s ease;display:flex;align-items:center;justify-content:center;
  gap:6px;user-select:none;touch-action:manipulation;will-change:transform}
.tab:active{transform:scale(.95)}
.tab.ar{background:linear-gradient(135deg,var(--g1),var(--g2));color:#020d08;
  box-shadow:0 4px 20px rgba(0,245,160,.3)}
.tab.at{background:linear-gradient(135deg,var(--a1),var(--a2));color:#1a0800;
  box-shadow:0 4px 20px rgba(255,107,53,.3)}
.tbadge{font-family:'DM Mono',monospace;font-size:.6rem;padding:1px 6px;border-radius:100px;
  background:rgba(0,0,0,.2);min-width:18px;text-align:center}

/* ── PANEL ── */
.panel{display:none}
.panel.on{display:block;animation:up .25s cubic-bezier(.16,1,.3,1) both}

/* ── INPUT ── */
.iw{position:relative;margin-bottom:20px}
.iw textarea{
  width:100%;background:var(--s1);border:1px solid var(--b);border-radius:var(--r);
  padding:14px 54px 14px 18px;font-size:.9rem;font-family:'Noto Sans Myanmar',sans-serif;
  color:var(--tx);outline:none;resize:none;overflow:hidden;min-height:48px;
  line-height:1.5;display:block;transition:border-color .2s,box-shadow .2s;
  -webkit-font-smoothing:antialiased}
.iw textarea::placeholder{color:var(--mu);font-size:.78rem}
#ri:focus{border-color:rgba(0,245,160,.5);box-shadow:0 0 0 3px rgba(0,245,160,.08)}
#ti:focus{border-color:rgba(255,107,53,.5);box-shadow:0 0 0 3px rgba(255,107,53,.08)}
.iadd{position:absolute;right:7px;top:7px;width:36px;height:36px;border:none;border-radius:10px;
  color:#fff;font-size:1.2rem;font-weight:700;cursor:pointer;display:flex;
  align-items:center;justify-content:center;transition:transform .15s cubic-bezier(.34,1.56,.64,1);
  touch-action:manipulation;will-change:transform;user-select:none;line-height:1}
.iadd:active{transform:scale(.85)!important}
.iadd-r{background:linear-gradient(135deg,var(--g1),#00c47a);box-shadow:0 3px 12px rgba(0,245,160,.35);color:#020d08}
.iadd-t{background:linear-gradient(135deg,var(--a1),var(--a2));box-shadow:0 3px 12px rgba(255,107,53,.35)}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat{background:var(--s1);border:1px solid var(--b);border-radius:14px;padding:12px 8px;
  text-align:center;contain:layout style paint}
.sn{font-family:'DM Mono',monospace;font-size:1.5rem;font-weight:500;display:block;line-height:1}
.sl{font-size:.65rem;color:var(--mu);margin-top:3px;letter-spacing:.06em}
.rstat .sn{color:var(--g1)} .rstat:nth-child(2) .sn{color:var(--g2)} .rstat:nth-child(3) .sn{color:var(--mu2)}
.tstat .sn{color:var(--a1)} .tstat:nth-child(2) .sn{color:var(--a2)} .tstat:nth-child(3) .sn{color:var(--mu2)}

/* ── PROGRESS ── */
.pcard{background:var(--s1);border:1px solid var(--b);border-radius:14px;
  padding:13px 16px;margin-bottom:20px;contain:layout style paint}
.ptop{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.ptitle{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--mu);letter-spacing:.1em;text-transform:uppercase}
.ppct{font-family:'DM Mono',monospace;font-size:.9rem;font-weight:500}
.rtext{color:var(--g1)} .ttext{color:var(--a1)}
.pbg{background:rgba(255,255,255,.05);border-radius:100px;height:5px;overflow:hidden}
.pfill{height:100%;border-radius:100px;transition:width .5s cubic-bezier(.16,1,.3,1);width:0%}
.pr{background:linear-gradient(90deg,var(--g1),var(--g2))} .pt{background:linear-gradient(90deg,var(--a1),var(--a2))}

/* ── LIST HEADER ── */
.lh{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding:0 2px}
.ll{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--mu);letter-spacing:.14em;text-transform:uppercase}
.acts{display:flex;gap:6px}
.pb{background:none;border:1px solid var(--b);color:var(--mu);font-size:.65rem;padding:4px 10px;
  border-radius:100px;cursor:pointer;font-family:'DM Mono',monospace;letter-spacing:.04em;
  transition:all .15s;touch-action:manipulation;user-select:none}
.pb:active{transform:scale(.9)}
.pb.g{border-color:rgba(0,245,160,.2);color:var(--g2)} .pb.g:active{background:rgba(0,245,160,.1)}
.pb.o{border-color:rgba(255,107,53,.2);color:var(--a1)} .pb.o:active{background:rgba(255,107,53,.1)}

/* ── ITEMS ── */
ul{list-style:none;display:flex;flex-direction:column;gap:7px}
.item{background:var(--s1);border:1px solid var(--b);border-radius:14px;
  padding:13px 14px;display:flex;align-items:flex-start;gap:10px;
  animation:si .3s cubic-bezier(.16,1,.3,1) both;
  transition:border-color .15s,background .15s;
  contain:layout style paint;will-change:transform;touch-action:manipulation}
@keyframes si{from{opacity:0;transform:translateY(6px) scale(.98)}to{opacity:1;transform:none}}
.item:active{transform:scale(.985);transition-duration:.05s}
.item.done{background:var(--done);border-color:rgba(0,245,160,.1)}
.inum{font-family:'DM Mono',monospace;font-size:.62rem;font-weight:500;min-width:22px;
  text-align:center;padding:2px 4px;border-radius:5px;line-height:1.6;flex-shrink:0;margin-top:1px}
.nr{color:var(--g1);background:rgba(0,245,160,.1)} .nt{color:var(--a1);background:rgba(255,107,53,.1)}
.item.done .inum{color:var(--mu);background:rgba(255,255,255,.05)}

/* ── CHECKBOX — 2026 style ── */
.chk{width:22px;height:22px;border-radius:7px;border:1.5px solid rgba(255,255,255,.15);
  cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  transition:all .18s cubic-bezier(.34,1.56,.64,1);user-select:none;margin-top:1px}
.chk:active{transform:scale(.82)!important}
#routine-panel .chk:active{border-color:var(--g1)}
#todo-panel .chk:active{border-color:var(--a1)}
.item.done .chk{background:linear-gradient(135deg,var(--g1),var(--g2));border-color:transparent;box-shadow:0 0 10px rgba(0,245,160,.4)}
.ci{display:none;width:5px;height:9px;border:1.5px solid #020d08;border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px)}
.item.done .ci{display:block}

.itx{flex:1;font-size:.88rem;line-height:1.55;word-break:break-word;transition:color .15s}
.item.done .itx{color:var(--mu);text-decoration:line-through;text-decoration-color:rgba(92,100,112,.5)}
.del{background:none;border:none;color:rgba(255,255,255,.15);cursor:pointer;width:26px;height:26px;
  border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.72rem;
  transition:all .15s;flex-shrink:0;touch-action:manipulation;margin-top:1px}
.del:active{color:rgba(255,90,90,.9);background:rgba(255,60,60,.12);transform:scale(.85)}

/* ── EMPTY ── */
.empty{text-align:center;padding:44px 0;display:none}
.ei{font-size:1.8rem;opacity:.3;display:block;margin-bottom:8px}
.et{font-size:.78rem;color:var(--mu);letter-spacing:.06em}

/* ── SMOOTH SYSTEM ── */
.item,.chk,.iadd,.pb,.tab{-webkit-backface-visibility:hidden;backface-visibility:hidden}
@media(max-width:768px){
  .item:hover{transform:none!important}
  .tab:hover{transform:none!important}
}
</style>
</head>
<body>
<canvas id="bgC"></canvas>
<canvas id="ocC"></canvas>

<div class="w">
  <header>
    <div class="htag">Daily Planner</div>
    <h1>Daily Task</h1>
    <div class="hsub">ROUTINE · FOCUS · DONE</div>
  </header>

  <div class="tabs">
    <button class="tab ar" id="tr" onclick="sw('routine')">
      <span>⬡</span> Routine <span class="tbadge" id="br">0</span>
    </button>
    <button class="tab" id="tt" onclick="sw('todo')">
      <span>◈</span> TO-DO <span class="tbadge" id="bt">0</span>
    </button>
  </div>

  <!-- ROUTINE -->
  <div class="panel on" id="routine-panel">
    <div class="iw">
      <textarea id="ri" placeholder="Routine ထည့်ပါ…  (Shift+Enter = သိမ်း)" rows="1"></textarea>
      <button class="iadd iadd-r" onclick="add('routine')">+</button>
    </div>
    <div class="stats">
      <div class="stat rstat"><span class="sn" id="r-total">0</span><div class="sl">စုစုပေါင်း</div></div>
      <div class="stat rstat"><span class="sn" id="r-done">0</span><div class="sl">ပြီးပြီ</div></div>
      <div class="stat rstat"><span class="sn" id="r-left">0</span><div class="sl">ကျန်သည်</div></div>
    </div>
    <div class="pcard">
      <div class="ptop"><span class="ptitle">Progress</span><span class="ppct rtext" id="r-pct">0%</span></div>
      <div class="pbg"><div class="pfill pr" id="r-bar"></div></div>
    </div>
    <div class="lh">
      <span class="ll">Routine Items</span>
      <div class="acts">
        <button class="pb g" onclick="reset()">↺ Reset</button>
        <button class="pb g" onclick="clr('routine')">✕ Done</button>
      </div>
    </div>
    <ul id="routine-list"></ul>
    <div class="empty" id="r-empty"><span class="ei">⬡</span><span class="et">မရှိသေးပါ</span></div>
  </div>

  <!-- TODO -->
  <div class="panel" id="todo-panel">
    <div class="iw">
      <textarea id="ti" placeholder="Task ထည့်ပါ…  (Shift+Enter = သိမ်း)" rows="1"></textarea>
      <button class="iadd iadd-t" onclick="add('todo')">+</button>
    </div>
    <div class="stats">
      <div class="stat tstat"><span class="sn" id="t-total">0</span><div class="sl">စုစုပေါင်း</div></div>
      <div class="stat tstat"><span class="sn" id="t-done">0</span><div class="sl">ပြီးပြီ</div></div>
      <div class="stat tstat"><span class="sn" id="t-left">0</span><div class="sl">ကျန်သည်</div></div>
    </div>
    <div class="pcard">
      <div class="ptop"><span class="ptitle">Progress</span><span class="ppct ttext" id="t-pct">0%</span></div>
      <div class="pbg"><div class="pfill pt" id="t-bar"></div></div>
    </div>
    <div class="lh">
      <span class="ll">Task Items</span>
      <div class="acts">
        <button class="pb o" onclick="clr('todo')">✕ Done</button>
      </div>
    </div>
    <ul id="todo-list"></ul>
    <div class="empty" id="t-empty"><span class="ei">◈</span><span class="et">မရှိသေးပါ</span></div>
  </div>
</div>

<script>
// ── DATA ──
const S = JSON.parse(localStorage.getItem('dt-v1')||'{"routine":[],"todo":[]}');
const sv = () => localStorage.setItem('dt-v1', JSON.stringify(S));
const ex = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');

// ── UI ──
function sw(t){
  ['routine','todo'].forEach(k=>{
    document.getElementById(k+'-panel').classList.toggle('on',k===t);
    const btn=document.getElementById(k==='routine'?'tr':'tt');
    btn.className='tab'+(k===t?(t==='routine'?' ar':' at'):'');
  });
}

function render(t){
  const items=S[t], pre=t==='routine'?'r':'t';
  const list=document.getElementById(t+'-list');
  const empty=document.getElementById(pre+'-empty');
  const nc=t==='routine'?'nr':'nt';
  list.innerHTML='';
  empty.style.display=items.length?'none':'block';
  items.forEach((it,i)=>{
    const li=document.createElement('li');
    li.className='item'+(it.done?' done':'');
    li.innerHTML=`<span class="inum ${nc}">${String(i+1).padStart(2,'0')}</span>
      <div class="chk" onclick="tog('${t}',${i})"><div class="ci"></div></div>
      <span class="itx">${ex(it.text)}</span>
      <button class="del" onclick="rm('${t}',${i})">✕</button>`;
    list.appendChild(li);
  });
  const total=items.length, done=items.filter(x=>x.done).length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById(pre+'-total').textContent=total;
  document.getElementById(pre+'-done').textContent=done;
  document.getElementById(pre+'-left').textContent=total-done;
  document.getElementById(pre+'-pct').textContent=pct+'%';
  document.getElementById(pre+'-bar').style.width=pct+'%';
  document.getElementById(t==='routine'?'br':'bt').textContent=total;
}

function add(t){
  const ta=document.getElementById(t==='routine'?'ri':'ti');
  const txt=ta.value.trim(); if(!txt){ta.focus();return;}
  S[t].push({text:txt,done:false}); sv(); render(t);
  ta.value=''; ta.style.height=''; ta.focus();
}
function tog(t,i){S[t][i].done=!S[t][i].done;sv();render(t);}
function rm(t,i){
  const li=document.getElementById(t+'-list').children[i];
  if(!li){S[t].splice(i,1);sv();render(t);return;}
  li.style.cssText='transition:all .2s ease;opacity:0;transform:translateX(12px) scale(.95);max-height:'+li.offsetHeight+'px';
  setTimeout(()=>{li.style.cssText+='max-height:0;padding:0;margin:0';},120);
  setTimeout(()=>{S[t].splice(i,1);sv();render(t);},260);
}
function clr(t){S[t]=S[t].filter(x=>!x.done);sv();render(t);}
function reset(){S.routine=S.routine.map(x=>({...x,done:false}));sv();render('routine');}

// ── TEXTAREA ──
['ri','ti'].forEach((id,idx)=>{
  const ta=document.getElementById(id), t=idx===0?'routine':'todo';
  let rt;
  ta.addEventListener('keydown',e=>{if(e.key==='Enter'&&e.shiftKey){e.preventDefault();add(t);}});
  ta.addEventListener('input',()=>{clearTimeout(rt);rt=setTimeout(()=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';},60);});
  ta.addEventListener('focus',()=>window.typ=true);
  ta.addEventListener('blur',()=>window.typ=false);
});

render('routine'); render('todo');

// ── PASSIVE LISTENERS ──
['touchstart','touchmove','wheel'].forEach(e=>document.addEventListener(e,()=>{},{passive:true}));
let scrollT; window.addEventListener('scroll',()=>{window.scrl=true;clearTimeout(scrollT);scrollT=setTimeout(()=>window.scrl=false,150);},{passive:true});
</script>

<!-- ══ CANVAS ══ -->
<script>
(()=>{
// ── ELECTRIC BG ──
const bc=document.getElementById('bgC'), bx=bc.getContext('2d');
let BW,BH=170;
const rsB=()=>{BW=bc.width=window.innerWidth;bc.height=BH;};rsB();
window.addEventListener('resize',rsB);

const pts=[]; for(let i=0;i<10;i++) pts.push({x:Math.random()*1400,y:Math.random()*BH,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.2,r:1+Math.random()*1.5,h:Math.random()*360,a:.2+Math.random()*.4,p:Math.random()*Math.PI*2});
const bolts=[];let bT=0;
function mkBolt(){const h=Math.random()*360,segs=[];let cx=Math.random()*BW,cy=5+Math.random()*BH*.6;
  for(let i=0;i<6+~~(Math.random()*6);i++){const nx=cx+(Math.random()-.3)*40,ny=cy+(Math.random()-.5)*18;segs.push([cx,cy,nx,ny]);cx=nx;cy=ny;}
  const l=10+Math.random()*10;bolts.push({segs,h,l,ml:l});}

let bLast=0,bF=0;
function animB(ts){
  requestAnimationFrame(animB);
  if(ts-bLast<50||window.typ)return;
  bLast=ts;bF++;
  bx.clearRect(0,0,BW,BH);
  pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.p+=.03;if(p.x<0)p.x=BW;if(p.x>BW)p.x=0;if(p.y<0)p.y=BH;if(p.y>BH)p.y=0;
    bx.beginPath();bx.arc(p.x,p.y,p.r,0,Math.PI*2);bx.fillStyle=`hsla(${(p.h+bF*.3)%360},100%,70%,${p.a*(.5+Math.sin(p.p)*.5)})`;bx.fill();});
  if(++bT>25+~~(Math.random()*20)){bT=0;mkBolt();if(Math.random()<.4)mkBolt();}
  for(let i=bolts.length-1;i>=0;i--){const b=bolts[i];b.l--;if(b.l<=0){bolts.splice(i,1);continue;}
    const a=b.l/b.ml*.8;
    b.segs.forEach(s=>{bx.strokeStyle=`hsla(${b.h},100%,92%,${a})`;bx.lineWidth=1.2;bx.lineCap='round';
      bx.beginPath();bx.moveTo(s[0],s[1]);bx.lineTo(s[2],s[3]);bx.stroke();});}
}
animB(0);

// ── OCTOPUS ──
const oc=document.getElementById('ocC'), ox=oc.getContext('2d');
let OW;const OH=170;
const rsO=()=>{OW=oc.width=window.innerWidth;oc.height=OH;};rsO();
window.addEventListener('resize',rsO);

// Octopus state
const o={x:Math.random()*window.innerWidth,y:40+Math.random()*90,vx:2.5,vy:.8,
  ang:0,tAng:0,hue:Math.random()*360,ph:0,burst:false,bT:0,sz:11};
let fc=0,nxt=80+~~(Math.random()*120);
const ARMS=8;

function dir(){const a=Math.random()*Math.PI*2,spd=o.burst?13:3;
  o.vx=Math.cos(a)*spd;o.vy=Math.sin(a)*spd*.45;o.tAng=a;}

dir();

// ── DRAW REAL OCTOPUS ──
function drawOcto(hue){
  const S=o.sz;
  // Mantle (bulbous top bag) — elongated oval
  const mG=ox.createRadialGradient(-S*.15,-S*.7,1,0,-S*.6,S*1.15);
  mG.addColorStop(0,'hsl(0,85%,32%)');mG.addColorStop(.6,'hsl(0,95%,16%)');mG.addColorStop(1,'hsl(0,100%,7%)');
  ox.beginPath();ox.ellipse(0,-S*.62,S*.65,S*1.08,0,0,Math.PI*2);
  ox.fillStyle=mG;ox.fill();
  ox.strokeStyle='hsl(0,100%,52%)';ox.lineWidth=1;ox.stroke();
  // Mantle texture stripes
  ox.strokeStyle='rgba(255,60,60,.18)';ox.lineWidth=.7;
  for(let i=0;i<4;i++){ox.beginPath();ox.ellipse(0,-S*.5+i*S*.28,S*(.55-i*.04),S*.09,0,0,Math.PI*2);ox.stroke();}
  // Mantle tip (pointy top)
  ox.beginPath();ox.moveTo(-S*.15,-S*1.55);ox.quadraticCurveTo(0,-S*1.85,S*.15,-S*1.55);
  ox.quadraticCurveTo(S*.62,-S*.8,S*.62,-S*.5);ox.ellipse(0,-S*.62,S*.65,S*1.08,0,Math.PI*.15,Math.PI*-.15,true);
  ox.quadraticCurveTo(-S*.62,-S*.8,-S*.15,-S*1.55);
  ox.fillStyle='hsl(0,90%,12%)';ox.fill();
  // Mantle fin lines
  ox.strokeStyle='rgba(255,80,40,.25)';ox.lineWidth=.8;
  [[-S*.58,-S*.55],[-S*.62,-S*.35],[S*.58,-S*.55],[S*.62,-S*.35]].forEach(([x,y])=>{
    ox.beginPath();ox.moveTo(x*.6,y*.7);ox.quadraticCurveTo(x*1.1,y,x*.8,y+S*.3);ox.stroke();});

  // Head/mantle dome (lower bulge where arms attach)
  const hG=ox.createRadialGradient(-S*.1,S*.05,1,0,S*.08,S*.88);
  hG.addColorStop(0,'hsl(0,80%,26%)');hG.addColorStop(1,'hsl(0,100%,8%)');
  ox.beginPath();ox.ellipse(0,S*.08,S*.82,S*.7,0,0,Math.PI*2);
  ox.fillStyle=hG;ox.fill();
  ox.strokeStyle='hsl(0,100%,45%)';ox.lineWidth=1;ox.stroke();

  // 2 big eyes with glow
  [[-S*.3,S*.0],[S*.3,S*.0]].forEach(([ex,ey])=>{
    // Eye glow
    const eg=ox.createRadialGradient(ex,ey,0,ex,ey,S*.3);
    eg.addColorStop(0,'rgba(255,120,80,.15)');eg.addColorStop(1,'transparent');
    ox.beginPath();ox.arc(ex,ey,S*.3,0,Math.PI*2);ox.fillStyle=eg;ox.fill();
    // Sclera
    ox.beginPath();ox.ellipse(ex,ey,S*.22,S*.24,0,0,Math.PI*2);
    ox.fillStyle='hsl(20,50%,82%)';ox.fill();
    ox.strokeStyle='hsl(0,100%,55%)';ox.lineWidth=.8;ox.stroke();
    // Iris
    ox.beginPath();ox.arc(ex,ey+S*.02,S*.14,0,Math.PI*2);
    ox.fillStyle='hsl(0,80%,35%)';ox.fill();
    // W-shaped slit pupil (horizontal)
    ox.beginPath();ox.ellipse(ex,ey+S*.02,S*.07,S*.045,0,0,Math.PI*2);
    ox.fillStyle='#060206';ox.fill();
    // Highlight
    ox.beginPath();ox.arc(ex-S*.05,ey-S*.05,S*.05,0,Math.PI*2);
    ox.fillStyle='rgba(255,255,255,.75)';ox.fill();
  });
  // Beak
  ox.strokeStyle='hsl(10,100%,65%)';ox.lineWidth=1.4;ox.lineCap='round';
  ox.beginPath();ox.moveTo(-S*.1,S*.28);ox.quadraticCurveTo(0,S*.42,S*.1,S*.28);ox.stroke();
  ox.beginPath();ox.moveTo(-S*.08,S*.3);ox.quadraticCurveTo(0,S*.2,S*.08,S*.3);ox.stroke();
}

// Bezier sample helper
function bz(x0,y0,cx,cy,x1,y1,t){const m=1-t;return{x:m*m*x0+2*m*t*cx+t*t*x1,y:m*m*y0+2*m*t*cy+t*t*y1};}

function drawArms(hue,ph){
  const S=o.sz;
  for(let ai=0;ai<ARMS;ai++){
    const bA=ai/ARMS*Math.PI*2+o.tAng;
    const wO=ai*.72, amp=S*(2.2+ai*.15);
    // Start at body rim
    const sx=Math.cos(bA)*S*.82, sy=Math.sin(bA)*S*.82;
    // Tentacle length — longer than body
    const tLen=S*4.6;
    const wave=Math.sin(ph*1.2+wO);
    const wave2=Math.sin(ph*.9+wO+1.8);
    const perpA=bA+Math.PI*.5;
    // Control point (mid-arm wave)
    const cx2=sx+Math.cos(bA)*tLen*.5+Math.cos(perpA)*wave*amp;
    const cy2=sy+Math.sin(bA)*tLen*.5+Math.sin(perpA)*wave*amp;
    // Tip
    const ex=sx+Math.cos(bA)*tLen+Math.cos(perpA)*wave2*amp*.6;
    const ey=sy+Math.sin(bA)*tLen+Math.sin(perpA)*wave2*amp*.6;

    const STEPS=12;
    for(let s=1;s<=STEPS;s++){
      const t0=(s-1)/STEPS, t1=s/STEPS;
      const p0=bz(sx,sy,cx2,cy2,ex,ey,t0);
      const p1=bz(sx,sy,cx2,cy2,ex,ey,t1);
      const fr=1-s/STEPS;
      const w=S*.68*fr+.5;
      // Dark tentacles with very subtle red tint
      const darkness=12+fr*16;
      ox.strokeStyle=`rgba(${darkness+10},${darkness*.3},${darkness*.3},${.7+fr*.25})`;
      ox.lineWidth=w;ox.lineCap='round';
      ox.beginPath();ox.moveTo(p0.x,p0.y);ox.lineTo(p1.x,p1.y);ox.stroke();
      // Sucker dots
      if(s%3===0&&fr>.12){ox.beginPath();ox.arc(p1.x,p1.y,w*.38,0,Math.PI*2);ox.fillStyle=`rgba(8,2,2,.55)`;ox.fill();}
    }
  }
}

const trail=[];
function drawTrail(){
  if(trail.length<2)return;
  for(let i=1;i<trail.length;i++){
    const a=i/trail.length*.35,h=(o.hue-i*2+360)%360;
    ox.strokeStyle=`hsla(${h},100%,60%,${a})`;
    ox.lineWidth=i/trail.length*2;ox.lineCap='round';
    ox.beginPath();ox.moveTo(trail[i-1].x,trail[i-1].y);ox.lineTo(trail[i].x,trail[i].y);ox.stroke();
  }
}

function upd(){
  fc++;o.hue=(o.hue+(o.burst?2.5:1))%360;o.ph+=o.burst?.2:.07;
  if(!o.burst&&fc>=nxt){o.burst=true;o.bT=15+~~(Math.random()*12);dir();}
  if(o.burst&&--o.bT<=0){o.burst=false;nxt=fc+55+~~(Math.random()*90);dir();}
  let da=o.tAng-o.ang;while(da>Math.PI)da-=Math.PI*2;while(da<-Math.PI)da+=Math.PI*2;
  o.ang+=da*.08;o.x+=o.vx;o.y+=o.vy;
  let b=false;
  if(o.x<28){o.x=28;b=true;}if(o.x>OW-28){o.x=OW-28;b=true;}
  if(o.y<22){o.y=22;b=true;}if(o.y>OH-22){o.y=OH-22;b=true;}
  if(b||Math.random()<.012)dir();
  trail.push({x:o.x,y:o.y});if(trail.length>10)trail.shift();
}

function drw(){
  ox.clearRect(0,0,OW,OH);
  drawTrail();
  ox.save();ox.translate(o.x,o.y);ox.rotate(o.tAng+Math.PI*.5);
  drawArms(o.hue,o.ph);
  drawOcto(o.hue);
  ox.restore();
}

let oLast=0;
function loop(ts){
  requestAnimationFrame(loop);
  if(ts-oLast<50||window.scrl||window.typ)return;
  oLast=ts;upd();drw();
}
requestAnimationFrame(loop);
})();
</script>
