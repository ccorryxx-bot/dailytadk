<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Daily Task</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Myanmar:wght@300;400;600&family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#08090d;--s1:#0f1117;--s2:#161820;
  --b:#ffffff0f;--bh:#ffffff1e;
  --g1:#00f5a0;--g2:#00d9f5;--g3:#00a8ff;
  --a1:#ff6b35;--a2:#ffb347;
  --tx:#f0f2f5;--mu:#5c6470;--mu2:#8892a0;
  --done:rgba(0,245,160,.05);--r:16px;
}
html{scroll-behavior:smooth;-webkit-overflow-scrolling:touch;text-size-adjust:100%}
body{
  background:var(--bg);color:var(--tx);
  font-family:'Noto Sans Myanmar',sans-serif;
  min-height:100vh;display:flex;justify-content:center;
  padding:0 14px 100px;-webkit-font-smoothing:antialiased;
  overscroll-behavior-y:contain;
}

/* ── MESH GRADIENT BG ── */
.mesh{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.mesh span{position:absolute;border-radius:50%;filter:blur(80px);animation:drift 12s ease-in-out infinite alternate}
.mesh span:nth-child(1){width:50vw;height:50vw;top:-10%;left:-5%;background:rgba(0,245,160,.07);animation-delay:0s}
.mesh span:nth-child(2){width:40vw;height:40vw;top:20%;right:-10%;background:rgba(0,217,245,.06);animation-delay:-4s}
.mesh span:nth-child(3){width:35vw;height:35vw;bottom:10%;left:20%;background:rgba(0,168,255,.05);animation-delay:-8s}
@keyframes drift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(15px,20px) scale(1.1)}}

/* ── CANVAS ── */
#bgC,#ocC{position:fixed;top:0;left:0;width:100%;height:170px;pointer-events:none;z-index:9}
#bgC{z-index:8}

.w{width:100%;max-width:520px;padding-top:50px;position:relative;z-index:10;animation:up .6s cubic-bezier(.16,1,.3,1) both}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ── HEADER ── */
header{text-align:center;margin-bottom:28px;padding-top:115px}
.htag{font-family:'DM Mono',monospace;font-size:.63rem;letter-spacing:.18em;color:var(--mu);
  text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px}
.htag::before,.htag::after{content:'';height:1px;width:24px;background:linear-gradient(90deg,transparent,var(--mu))}
h1{font-family:'Syne',sans-serif;font-size:2.3rem;font-weight:800;line-height:1.05;
  background:linear-gradient(135deg,var(--g1),var(--g2),var(--g3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:hglow 3s ease-in-out infinite alternate}
@keyframes hglow{
  0%{filter:drop-shadow(0 0 8px rgba(0,245,160,.55))}
  50%{filter:drop-shadow(0 0 5px rgba(0,217,245,.35))}
  100%{filter:drop-shadow(0 0 12px rgba(0,168,255,.6))}
}

/* ── STREAK BAR ── */
.streak-bar{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:8px;flex-wrap:wrap}
.streak{display:flex;align-items:center;gap:5px;background:var(--s1);border:1px solid var(--b);
  border-radius:100px;padding:4px 12px;font-family:'DM Mono',monospace;font-size:.7rem}
.streak-fire{font-size:.9rem}
.streak-num{color:var(--g1);font-weight:500}
.streak-lbl{color:var(--mu);font-size:.62rem}
.today-pct{display:flex;align-items:center;gap:5px;background:var(--s1);border:1px solid var(--b);
  border-radius:100px;padding:4px 12px;font-family:'DM Mono',monospace;font-size:.7rem;color:var(--mu2)}
.today-pct span{color:var(--a1);font-weight:500}

/* ── TABS ── */
.tabs{display:flex;gap:6px;margin-bottom:22px;background:var(--s1);
  border-radius:100px;padding:5px;border:1px solid var(--b)}
.tab{flex:1;padding:10px 8px;border:none;border-radius:100px;background:transparent;
  color:var(--mu);font-family:'Noto Sans Myanmar',sans-serif;font-size:.83rem;font-weight:600;
  cursor:pointer;transition:all .2s ease;display:flex;align-items:center;justify-content:center;
  gap:6px;user-select:none;touch-action:manipulation}
.tab:active{transform:scale(.95)}
.tab.ar{background:linear-gradient(135deg,var(--g1),var(--g2));color:#020d08;box-shadow:0 4px 18px rgba(0,245,160,.28)}
.tab.at{background:linear-gradient(135deg,var(--a1),var(--a2));color:#1a0800;box-shadow:0 4px 18px rgba(255,107,53,.28)}
.tbadge{font-family:'DM Mono',monospace;font-size:.58rem;padding:1px 6px;border-radius:100px;background:rgba(0,0,0,.2);min-width:18px;text-align:center}

/* ── PANEL ── */
.panel{display:none}.panel.on{display:block;animation:up .25s cubic-bezier(.16,1,.3,1) both}

/* ── INPUT ── */
.iw{position:relative;margin-bottom:18px}
.iw textarea{width:100%;background:var(--s1);border:1px solid var(--b);border-radius:var(--r);
  padding:13px 52px 13px 17px;font-size:.9rem;font-family:'Noto Sans Myanmar',sans-serif;
  color:var(--tx);outline:none;resize:none;overflow:hidden;min-height:46px;
  line-height:1.5;display:block;transition:border-color .2s,box-shadow .2s;-webkit-font-smoothing:antialiased}
.iw textarea::placeholder{color:var(--mu);font-size:.76rem}
#ri:focus{border-color:rgba(0,245,160,.5);box-shadow:0 0 0 3px rgba(0,245,160,.07)}
#ti:focus{border-color:rgba(255,107,53,.5);box-shadow:0 0 0 3px rgba(255,107,53,.07)}
.iadd{position:absolute;right:7px;top:6px;width:35px;height:35px;border:none;border-radius:10px;
  font-size:1.2rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:transform .15s cubic-bezier(.34,1.56,.64,1);touch-action:manipulation;user-select:none;line-height:1}
.iadd:active{transform:scale(.82)!important}
.iadd-r{background:linear-gradient(135deg,var(--g1),#00c47a);box-shadow:0 3px 10px rgba(0,245,160,.3);color:#020d08}
.iadd-t{background:linear-gradient(135deg,var(--a1),var(--a2));box-shadow:0 3px 10px rgba(255,107,53,.3);color:#fff}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:13px}
.stat{background:var(--s1);border:1px solid var(--b);border-radius:13px;padding:11px 8px;
  text-align:center;contain:layout style paint;position:relative;overflow:hidden}
/* shimmer */
.stat::after{content:'';position:absolute;inset:0;background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.04) 50%,transparent 60%);
  transform:translateX(-100%);animation:shim 3s ease-in-out infinite;animation-delay:calc(var(--d)*1s)}
@keyframes shim{0%,70%{transform:translateX(-100%)}80%,100%{transform:translateX(200%)}}
.stat:nth-child(1){--d:0}.stat:nth-child(2){--d:.4}.stat:nth-child(3){--d:.8}
.sn{font-family:'DM Mono',monospace;font-size:1.45rem;font-weight:500;display:block;line-height:1;transition:all .3s}
.sl{font-size:.63rem;color:var(--mu);margin-top:3px;letter-spacing:.05em}
.rstat .sn{color:var(--g1)}.rstat:nth-child(2) .sn{color:var(--g2)}.rstat:nth-child(3) .sn{color:var(--mu2)}
.tstat .sn{color:var(--a1)}.tstat:nth-child(2) .sn{color:var(--a2)}.tstat:nth-child(3) .sn{color:var(--mu2)}

/* ── PROGRESS ── */
.pcard{background:var(--s1);border:1px solid var(--b);border-radius:13px;padding:12px 15px;margin-bottom:18px;contain:layout style paint}
.ptop{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
.ptitle{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--mu);letter-spacing:.1em;text-transform:uppercase}
.ppct{font-family:'DM Mono',monospace;font-size:.88rem;font-weight:500}
.rtext{color:var(--g1)}.ttext{color:var(--a1)}
.pbg{background:rgba(255,255,255,.05);border-radius:100px;height:5px;overflow:hidden}
.pfill{height:100%;border-radius:100px;transition:width .5s cubic-bezier(.16,1,.3,1);width:0%}
.pr{background:linear-gradient(90deg,var(--g1),var(--g2))}.pt{background:linear-gradient(90deg,var(--a1),var(--a2))}

/* ── MINI HISTORY CHART ── */
.hchart{display:flex;align-items:flex-end;gap:3px;height:28px;margin-top:8px}
.hbar{flex:1;border-radius:3px 3px 0 0;min-height:3px;transition:height .4s cubic-bezier(.16,1,.3,1)}
.hbar-r{background:linear-gradient(0deg,var(--g1),var(--g2));}
.hbar-t{background:linear-gradient(0deg,var(--a1),var(--a2));}
.hdays{display:flex;gap:3px;margin-top:3px}
.hday{flex:1;text-align:center;font-family:'DM Mono',monospace;font-size:.48rem;color:var(--mu)}

/* ── LIST HEADER ── */
.lh{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px;padding:0 2px}
.ll{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--mu);letter-spacing:.14em;text-transform:uppercase}
.acts{display:flex;gap:5px}
.pb{background:none;border:1px solid var(--b);color:var(--mu);font-size:.63rem;padding:4px 10px;
  border-radius:100px;cursor:pointer;font-family:'DM Mono',monospace;
  transition:all .15s;touch-action:manipulation;user-select:none}
.pb:active{transform:scale(.88)}
.pb.g{border-color:rgba(0,245,160,.2);color:var(--g2)}.pb.g:active{background:rgba(0,245,160,.1)}
.pb.o{border-color:rgba(255,107,53,.2);color:var(--a1)}.pb.o:active{background:rgba(255,107,53,.1)}

/* ── ITEMS ── */
ul{list-style:none;display:flex;flex-direction:column;gap:6px}
.item{background:var(--s1);border:1px solid var(--b);border-radius:13px;
  display:flex;align-items:flex-start;gap:9px;
  animation:si .3s cubic-bezier(.16,1,.3,1) both;
  contain:layout style paint;position:relative;overflow:hidden;
  touch-action:pan-y;cursor:grab;transition:border-color .15s,background .15s,transform .15s,box-shadow .15s}
@keyframes si{from{opacity:0;transform:translateY(6px) scale(.98)}to{opacity:1;transform:none}}
.item:active{transform:scale(.985);transition-duration:.05s}
.item.done{background:var(--done);border-color:rgba(0,245,160,.1)}
.item.dragging{opacity:.5;border-color:var(--g1);box-shadow:0 8px 32px rgba(0,0,0,.4);transform:scale(1.02);z-index:100}
.item.drag-over{border-color:var(--g2);background:rgba(0,217,245,.05)}

/* inner padding wrapper */
.ip{display:flex;align-items:flex-start;gap:9px;padding:12px 12px;flex:1;min-width:0}

/* swipe delete layer */
.swipe-bg{position:absolute;right:0;top:0;bottom:0;width:70px;display:flex;align-items:center;
  justify-content:center;background:linear-gradient(90deg,transparent,rgba(255,60,60,.85));
  border-radius:0 13px 13px 0;opacity:0;transition:opacity .15s;pointer-events:none;font-size:1rem}

.inum{font-family:'DM Mono',monospace;font-size:.6rem;font-weight:500;min-width:20px;
  text-align:center;padding:2px 4px;border-radius:5px;line-height:1.6;flex-shrink:0;margin-top:2px}
.nr{color:var(--g1);background:rgba(0,245,160,.1)}.nt{color:var(--a1);background:rgba(255,107,53,.1)}
.item.done .inum{color:var(--mu);background:rgba(255,255,255,.04)}

/* drag handle */
.dh{color:rgba(255,255,255,.12);font-size:.75rem;cursor:grab;flex-shrink:0;margin-top:3px;user-select:none;padding:2px}

.chk{width:21px;height:21px;border-radius:7px;border:1.5px solid rgba(255,255,255,.14);
  cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  transition:all .18s cubic-bezier(.34,1.56,.64,1);user-select:none;margin-top:2px}
.chk:active{transform:scale(.8)!important}
.item.done .chk{background:linear-gradient(135deg,var(--g1),var(--g2));border-color:transparent;box-shadow:0 0 10px rgba(0,245,160,.35)}
.ci{display:none;width:5px;height:8px;border:1.5px solid #020d08;border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px)}
.item.done .ci{display:block}
.itx{flex:1;font-size:.87rem;line-height:1.55;word-break:break-word;transition:color .15s;min-width:0}
.item.done .itx{color:var(--mu);text-decoration:line-through;text-decoration-color:rgba(92,100,112,.45)}
.del{background:none;border:none;color:rgba(255,255,255,.14);cursor:pointer;width:25px;height:25px;
  border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.7rem;
  transition:all .12s;flex-shrink:0;touch-action:manipulation;margin-top:2px}
.del:active{color:rgba(255,90,90,.9);background:rgba(255,60,60,.12);transform:scale(.82)}

/* ── EMPTY ── */
.empty{text-align:center;padding:42px 0;display:none}
.ei{font-size:1.7rem;opacity:.28;display:block;margin-bottom:7px}
.et{font-size:.76rem;color:var(--mu);letter-spacing:.05em}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--s2);border:1px solid var(--bh);border-radius:100px;
  padding:8px 20px;font-size:.78rem;color:var(--tx);font-family:'DM Mono',monospace;
  letter-spacing:.05em;transition:transform .3s cubic-bezier(.16,1,.3,1),opacity .3s;
  opacity:0;z-index:9999;white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* ── PERF ── */
.item,.chk,.iadd,.pb,.tab{-webkit-backface-visibility:hidden;backface-visibility:hidden}
@media(max-width:768px){.item:hover{transform:none!important}}
</style>
</head>
<body>
<div class="mesh"><span></span><span></span><span></span></div>
<canvas id="bgC"></canvas>
<canvas id="ocC"></canvas>
<div class="toast" id="toast"></div>

<div class="w">
  <header>
    <div class="htag">Daily Planner</div>
    <h1>Daily Task</h1>
    <div class="streak-bar">
      <div class="streak">
        <span class="streak-fire">🔥</span>
        <span class="streak-num" id="sc">0</span>
        <span class="streak-lbl">day streak</span>
      </div>
      <div class="today-pct">Today <span id="tpct">0%</span></div>
    </div>
  </header>

  <div class="tabs">
    <button class="tab ar" id="tr" onclick="sw('routine')">⬡ Routine <span class="tbadge" id="br">0</span></button>
    <button class="tab" id="tt" onclick="sw('todo')">◈ TO-DO <span class="tbadge" id="bt">0</span></button>
  </div>

  <!-- ROUTINE -->
  <div class="panel on" id="routine-panel">
    <div class="iw">
      <textarea id="ri" placeholder="Routine ထည့်ပါ…  Shift+Enter=သိမ်း" rows="1"></textarea>
      <button class="iadd iadd-r" onclick="add('routine')">+</button>
    </div>
    <div class="stats">
      <div class="stat rstat"><span class="sn" id="r-total">0</span><div class="sl">စုစုပေါင်း</div></div>
      <div class="stat rstat"><span class="sn" id="r-done">0</span><div class="sl">ပြီးပြီ</div></div>
      <div class="stat rstat"><span class="sn" id="r-left">0</span><div class="sl">ကျန်သည်</div></div>
    </div>
    <div class="pcard">
      <div class="ptop"><span class="ptitle">Progress</span><span class="ppct rtext" id="r-pct">0%</span></div>
      <div class="pbg"><div class="pfill pr" id="r-bar"></div></div>
      <div class="hchart" id="r-hchart"></div>
      <div class="hdays" id="r-hdays"></div>
    </div>
    <div class="lh">
      <span class="ll">Routine Items</span>
      <div class="acts">
        <button class="pb g" onclick="resetR()">↺ Reset</button>
        <button class="pb g" onclick="clr('routine')">✕ Done</button>
      </div>
    </div>
    <ul id="routine-list"></ul>
    <div class="empty" id="r-empty"><span class="ei">⬡</span><span class="et">မရှိသေးပါ</span></div>
  </div>

  <!-- TODO -->
  <div class="panel" id="todo-panel">
    <div class="iw">
      <textarea id="ti" placeholder="Task ထည့်ပါ…  Shift+Enter=သိမ်း" rows="1"></textarea>
      <button class="iadd iadd-t" onclick="add('todo')">+</button>
    </div>
    <div class="stats">
      <div class="stat tstat"><span class="sn" id="t-total">0</span><div class="sl">စုစုပေါင်း</div></div>
      <div class="stat tstat"><span class="sn" id="t-done">0</span><div class="sl">ပြီးပြီ</div></div>
      <div class="stat tstat"><span class="sn" id="t-left">0</span><div class="sl">ကျန်သည်</div></div>
    </div>
    <div class="pcard">
      <div class="ptop"><span class="ptitle">Progress</span><span class="ppct ttext" id="t-pct">0%</span></div>
      <div class="pbg"><div class="pfill pt" id="t-bar"></div></div>
      <div class="hchart" id="t-hchart"></div>
      <div class="hdays" id="t-hdays"></div>
    </div>
    <div class="lh">
      <span class="ll">Task Items</span>
      <div class="acts">
        <button class="pb o" onclick="clr('todo')">✕ Done</button>
      </div>
    </div>
    <ul id="todo-list"></ul>
    <div class="empty" id="t-empty"><span class="ei">◈</span><span class="et">မရှိသေးပါ</span></div>
  </div>
</div>

<script>
// ── DATA ──
const KEY='dt-v2', HKEY='dt-hist';
let S=JSON.parse(localStorage.getItem(KEY)||'{"routine":[],"todo":[]}');
let H=JSON.parse(localStorage.getItem(HKEY)||'[]');
const sv=()=>localStorage.setItem(KEY,JSON.stringify(S));
const svH=()=>localStorage.setItem(HKEY,JSON.stringify(H));
const ex=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');

// ── TOAST ──
let toastT;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2200);
}

// ── HAPTIC ──
const vib=ms=>navigator.vibrate&&navigator.vibrate(ms);

// ── DATE & STREAK ──
const today=()=>new Date().toISOString().slice(0,10);
function checkStreak(){
  const d=today();
  const last=H.length?H[H.length-1]:null;
  if(!last||last.date!==d) return;
  // count consecutive days
  let streak=0,prev=null;
  for(let i=H.length-1;i>=0;i--){
    const dd=new Date(H[i].date),ex=prev?new Date(prev):(new Date(d));
    const diff=(ex-dd)/(1000*60*60*24);
    if(i===H.length-1){if(H[i].pct===100)streak=1;}
    else if(diff<=1&&H[i].pct===100)streak++;
    else break;
    prev=H[i].date;
  }
  document.getElementById('sc').textContent=streak;
}

function saveHistory(){
  const d=today();
  const rt=S.routine.length,rd=S.routine.filter(x=>x.done).length;
  const tt=S.todo.length,td=S.todo.filter(x=>x.done).length;
  const tot=(rt+tt),don=(rd+td);
  const pct=tot?Math.round(don/tot*100):0;
  document.getElementById('tpct').textContent=pct+'%';
  const i=H.findIndex(x=>x.date===d);
  if(i>=0)H[i]={date:d,pct,r:rt?Math.round(rd/rt*100):0,t:tt?Math.round(td/tt*100):0};
  else H.push({date:d,pct,r:rt?Math.round(rd/rt*100):0,t:tt?Math.round(td/tt*100):0});
  if(H.length>14)H=H.slice(-14);
  svH();checkStreak();
  renderChart('routine');renderChart('todo');
}

// ── CHART ──
const DAYS=['S','M','T','W','T','F','S'];
function renderChart(t){
  const pre=t==='routine'?'r':'t';
  const last7=H.slice(-7);
  const chart=document.getElementById(pre+'-hchart');
  const days=document.getElementById(pre+'-hdays');
  const key=t==='routine'?'r':'t';
  const max=100;
  chart.innerHTML=last7.map(h=>{
    const v=h[key]||0;
    const h2=Math.round((v/max)*24)+4;
    return `<div class="hbar hbar-${pre[0]}" style="height:${h2}px;opacity:${.4+v/100*.6}" title="${v}%"></div>`;
  }).join('');
  days.innerHTML=last7.map(h=>{
    const d=new Date(h.date);
    return `<div class="hday">${DAYS[d.getDay()]}</div>`;
  }).join('');
}

// ── AUTO DAILY RESET ──
function checkDailyReset(){
  const lastD=localStorage.getItem('dt-lastday');
  const d=today();
  if(lastD&&lastD!==d){
    saveHistory();
    S.routine=S.routine.map(x=>({...x,done:false}));
    sv();toast('🌅 နေ့သစ် — Routine reset ပြီးပြီ');
  }
  localStorage.setItem('dt-lastday',d);
}
checkDailyReset();

// ── RENDER ──
function render(t){
  const items=S[t],pre=t==='routine'?'r':'t';
  const list=document.getElementById(t+'-list');
  const empty=document.getElementById(pre+'-empty');
  const nc=t==='routine'?'nr':'nt';
  list.innerHTML='';
  empty.style.display=items.length?'none':'block';
  items.forEach((it,i)=>{
    const li=document.createElement('li');
    li.className='item'+(it.done?' done':'');
    li.dataset.i=i;li.dataset.t=t;
    li.innerHTML=`
      <div class="swipe-bg">🗑️</div>
      <div class="ip">
        <span class="dh" title="drag">⠿</span>
        <span class="inum ${nc}">${String(i+1).padStart(2,'0')}</span>
        <div class="chk" onclick="tog('${t}',${i})"><div class="ci"></div></div>
        <span class="itx">${ex(it.text)}</span>
        <button class="del" onclick="rm('${t}',${i})">✕</button>
      </div>`;
    list.appendChild(li);
    initSwipe(li,t,i);
    initDrag(li);
  });
  const total=items.length,done=items.filter(x=>x.done).length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById(pre+'-total').textContent=total;
  document.getElementById(pre+'-done').textContent=done;
  document.getElementById(pre+'-left').textContent=total-done;
  document.getElementById(pre+'-pct').textContent=pct+'%';
  document.getElementById(pre+'-bar').style.width=pct+'%';
  document.getElementById(t==='routine'?'br':'bt').textContent=total;
  saveHistory();
}

// ── SWIPE TO DELETE ──
function initSwipe(li,t,i){
  let sx=0,dx=0,swiping=false;
  const bg=li.querySelector('.swipe-bg');
  const ip=li.querySelector('.ip');
  li.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;swiping=true;dx=0;},{passive:true});
  li.addEventListener('touchmove',e=>{
    if(!swiping)return;
    dx=e.touches[0].clientX-sx;
    if(dx<-10){ip.style.transform=`translateX(${Math.max(dx,-75)}px)`;bg.style.opacity=Math.min(-dx/75,1);}
  },{passive:true});
  li.addEventListener('touchend',()=>{
    swiping=false;
    if(dx<-60){vib(15);rm(t,i);}
    else{ip.style.transform='';bg.style.opacity=0;}
  });
}

// ── DRAG TO REORDER ──
let dragSrc=null;
function initDrag(li){
  const dh=li.querySelector('.dh');
  dh.addEventListener('touchstart',e=>{
    e.stopPropagation();
    dragSrc=li;li.classList.add('dragging');vib(8);
  },{passive:true});
  li.addEventListener('touchmove',e=>{
    if(!dragSrc||dragSrc!==li)return;
    const touch=e.touches[0];
    const els=document.elementsFromPoint(touch.clientX,touch.clientY);
    const over=els.find(el=>el.classList&&el.classList.contains('item')&&el!==dragSrc);
    document.querySelectorAll('.item').forEach(el=>el.classList.remove('drag-over'));
    if(over)over.classList.add('drag-over');
  },{passive:true});
  li.addEventListener('touchend',()=>{
    if(!dragSrc)return;
    const t=dragSrc.dataset.t;
    const over=document.querySelector('.item.drag-over');
    if(over&&over!==dragSrc){
      const from=parseInt(dragSrc.dataset.i),to=parseInt(over.dataset.i);
      const arr=S[t];
      const [moved]=arr.splice(from,1);arr.splice(to,0,moved);
      sv();render(t);
    }
    document.querySelectorAll('.item').forEach(el=>{el.classList.remove('dragging','drag-over');});
    dragSrc=null;
  });
}

// ── ACTIONS ──
function sw(t){
  ['routine','todo'].forEach(k=>{
    document.getElementById(k+'-panel').classList.toggle('on',k===t);
    const b=document.getElementById(k==='routine'?'tr':'tt');
    b.className='tab'+(k===t?(t==='routine'?' ar':' at'):'');
  });
}
function add(t){
  const ta=document.getElementById(t==='routine'?'ri':'ti');
  const txt=ta.value.trim();if(!txt){ta.focus();return;}
  S[t].push({text:txt,done:false});sv();render(t);
  ta.value='';ta.style.height='';ta.focus();vib(6);
  toast('✓ ထည့်ပြီးပြီ');
}
function tog(t,i){
  S[t][i].done=!S[t][i].done;sv();render(t);
  vib(S[t][i].done?[10,50,10]:5);
  if(S[t][i].done)toast('✅ ပြီးပြီ!');
}
function rm(t,i){
  const list=document.getElementById(t+'-list');
  const li=list.children[i];
  if(!li){S[t].splice(i,1);sv();render(t);return;}
  li.style.cssText='transition:all .2s ease;opacity:0;transform:translateX(16px) scale(.95);max-height:'+li.offsetHeight+'px';
  setTimeout(()=>{li.style.cssText+='max-height:0;padding:0;margin:0;border:none';},110);
  setTimeout(()=>{S[t].splice(i,1);sv();render(t);vib(8);toast('🗑️ ဖျက်ပြီးပြီ');},240);
}
function clr(t){S[t]=S[t].filter(x=>!x.done);sv();render(t);toast('🧹 Done items ဖယ်ပြီးပြီ');}
function resetR(){S.routine=S.routine.map(x=>({...x,done:false}));sv();render('routine');toast('↺ Reset ပြီးပြီ');}

// ── TEXTAREA ──
['ri','ti'].forEach((id,idx)=>{
  const ta=document.getElementById(id),t=idx===0?'routine':'todo';
  let rt;
  ta.addEventListener('keydown',e=>{if(e.key==='Enter'&&e.shiftKey){e.preventDefault();add(t);}});
  ta.addEventListener('input',()=>{clearTimeout(rt);rt=setTimeout(()=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';},60);});
  ta.addEventListener('focus',()=>window.typ=true);
  ta.addEventListener('blur',()=>window.typ=false);
});

render('routine');render('todo');

['touchstart','touchmove','wheel'].forEach(e=>document.addEventListener(e,()=>{},{passive:true}));
let scrollT;window.addEventListener('scroll',()=>{window.scrl=true;clearTimeout(scrollT);scrollT=setTimeout(()=>window.scrl=false,150);},{passive:true});
</script>

<!-- ══ CANVAS ══ -->
<script>
(()=>{
// ── ELECTRIC BG ──
const bc=document.getElementById('bgC'),bx=bc.getContext('2d');
let BW;const BH=170;
const rsB=()=>{BW=bc.width=window.innerWidth;bc.height=BH;};rsB();
window.addEventListener('resize',rsB);
const pts=[];for(let i=0;i<10;i++)pts.push({x:Math.random()*1400,y:Math.random()*BH,vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.18,r:.8+Math.random()*1.4,h:Math.random()*360,a:.18+Math.random()*.35,p:Math.random()*Math.PI*2});
const bolts=[];let bT=0;
function mkB(){const h=Math.random()*360,segs=[];let cx=Math.random()*BW,cy=5+Math.random()*BH*.6;
  for(let i=0;i<5+~~(Math.random()*5);i++){const nx=cx+(Math.random()-.3)*38,ny=cy+(Math.random()-.5)*16;segs.push([cx,cy,nx,ny]);cx=nx;cy=ny;}
  const l=9+Math.random()*9;bolts.push({segs,h,l,ml:l});}
let bL=0,bF=0;
function animB(ts){
  requestAnimationFrame(animB);
  if(ts-bL<50||window.typ)return;bL=ts;bF++;
  bx.clearRect(0,0,BW,BH);
  pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.p+=.025;if(p.x<0)p.x=BW;if(p.x>BW)p.x=0;if(p.y<0)p.y=BH;if(p.y>BH)p.y=0;
    bx.beginPath();bx.arc(p.x,p.y,p.r,0,Math.PI*2);bx.fillStyle=`hsla(${(p.h+bF*.25)%360},100%,70%,${p.a*(.5+Math.sin(p.p)*.5)})`;bx.fill();});
  if(++bT>28+~~(Math.random()*18)){bT=0;mkB();if(Math.random()<.35)mkB();}
  for(let i=bolts.length-1;i>=0;i--){const b=bolts[i];b.l--;if(b.l<=0){bolts.splice(i,1);continue;}
    const a=b.l/b.ml*.75;
    b.segs.forEach(s=>{bx.strokeStyle=`hsla(${b.h},100%,90%,${a})`;bx.lineWidth=1.1;bx.lineCap='round';
      bx.beginPath();bx.moveTo(s[0],s[1]);bx.lineTo(s[2],s[3]);bx.stroke();});}
}
animB(0);

// ── OCTOPUS ──
const oc=document.getElementById('ocC'),ox=oc.getContext('2d');
let OW;const OH=170;
const rsO=()=>{OW=oc.width=window.innerWidth;oc.height=OH;};rsO();
window.addEventListener('resize',rsO);

const o={x:Math.random()*window.innerWidth,y:42+Math.random()*88,vx:2.8,vy:.7,
  tAng:0,hue:Math.random()*360,ph:0,burst:false,bT:0,sz:10};
let fc=0,nxt=80+~~(Math.random()*100);

function dir(){const a=Math.random()*Math.PI*2,spd=o.burst?13:3;
  o.vx=Math.cos(a)*spd;o.vy=Math.sin(a)*spd*.42;o.tAng=a;}
dir();

function bz(x0,y0,cx,cy,x1,y1,t){const m=1-t;return{x:m*m*x0+2*m*t*cx+t*t*x1,y:m*m*y0+2*m*t*cy+t*t*y1};}

function drawOcto(){
  const S=o.sz;
  // Arms first (behind body)
  for(let ai=0;ai<8;ai++){
    const bA=ai/8*Math.PI*2+o.tAng;
    const wO=ai*.72,amp=S*(2.0+ai*.12);
    const sx=Math.cos(bA)*S*.8,sy=Math.sin(bA)*S*.8;
    const tL=S*4.4,wave=Math.sin(o.ph*1.2+wO),wave2=Math.sin(o.ph*.9+wO+1.8);
    const perp=bA+Math.PI*.5;
    const cx2=sx+Math.cos(bA)*tL*.5+Math.cos(perp)*wave*amp;
    const cy2=sy+Math.sin(bA)*tL*.5+Math.sin(perp)*wave*amp;
    const ex=sx+Math.cos(bA)*tL+Math.cos(perp)*wave2*amp*.55;
    const ey=sy+Math.sin(bA)*tL+Math.sin(perp)*wave2*amp*.55;
    const STEPS=10;
    for(let s=1;s<=STEPS;s++){
      const t0=(s-1)/STEPS,t1=s/STEPS;
      const p0=bz(sx,sy,cx2,cy2,ex,ey,t0),p1=bz(sx,sy,cx2,cy2,ex,ey,t1);
      const fr=1-s/STEPS,w=S*.62*fr+.4;
      const dk=10+fr*14;
      ox.strokeStyle=`rgba(${dk+8},${dk*.25},${dk*.25},${.72+fr*.22})`;
      ox.lineWidth=w;ox.lineCap='round';
      ox.beginPath();ox.moveTo(p0.x,p0.y);ox.lineTo(p1.x,p1.y);ox.stroke();
      if(s%3===0&&fr>.1){ox.beginPath();ox.arc(p1.x,p1.y,w*.35,0,Math.PI*2);ox.fillStyle='rgba(6,1,1,.5)';ox.fill();}
    }
  }
  // Head dome
  const hG=ox.createRadialGradient(-S*.1,S*.06,1,0,S*.08,S*.85);
  hG.addColorStop(0,'hsl(0,78%,25%)');hG.addColorStop(1,'hsl(0,100%,7%)');
  ox.beginPath();ox.ellipse(0,S*.08,S*.8,S*.68,0,0,Math.PI*2);
  ox.fillStyle=hG;ox.fill();ox.strokeStyle='hsl(0,100%,42%)';ox.lineWidth=.9;ox.stroke();
  // Mantle
  const mG=ox.createRadialGradient(-S*.12,-S*.65,1,0,-S*.58,S*1.1);
  mG.addColorStop(0,'hsl(0,85%,30%)');mG.addColorStop(1,'hsl(0,100%,8%)');
  ox.beginPath();ox.ellipse(0,-S*.6,S*.62,S*1.05,0,0,Math.PI*2);
  ox.fillStyle=mG;ox.fill();ox.strokeStyle='hsl(0,100%,48%)';ox.lineWidth=.9;ox.stroke();
  // Mantle tip
  ox.beginPath();ox.moveTo(-S*.12,-S*1.52);ox.quadraticCurveTo(0,-S*1.78,S*.12,-S*1.52);
  ox.quadraticCurveTo(S*.6,-S*.78,0,-S*.6);ox.quadraticCurveTo(-S*.6,-S*.78,-S*.12,-S*1.52);
  ox.fillStyle='hsl(0,90%,10%)';ox.fill();
  // Fin lines
  ox.strokeStyle='rgba(255,70,35,.22)';ox.lineWidth=.7;
  [[-S*.56,-S*.52],[S*.56,-S*.52]].forEach(([x,y])=>{
    ox.beginPath();ox.moveTo(x*.55,y*.65);ox.quadraticCurveTo(x*1.08,y,x*.72,y+S*.28);ox.stroke();});
  // Eyes
  [[-S*.28,S*.0],[S*.28,S*.0]].forEach(([ex,ey])=>{
    // glow
    const eg=ox.createRadialGradient(ex,ey,0,ex,ey,S*.28);
    eg.addColorStop(0,'rgba(255,100,70,.12)');eg.addColorStop(1,'transparent');
    ox.beginPath();ox.arc(ex,ey,S*.28,0,Math.PI*2);ox.fillStyle=eg;ox.fill();
    // sclera
    ox.beginPath();ox.ellipse(ex,ey,S*.2,S*.22,0,0,Math.PI*2);
    ox.fillStyle='hsl(18,45%,80%)';ox.fill();ox.strokeStyle='hsl(0,100%,52%)';ox.lineWidth=.7;ox.stroke();
    // iris
    ox.beginPath();ox.arc(ex,ey+S*.02,S*.13,0,Math.PI*2);ox.fillStyle='hsl(0,75%,32%)';ox.fill();
    // W-slit pupil
    ox.beginPath();ox.ellipse(ex,ey+S*.02,S*.065,S*.04,0,0,Math.PI*2);ox.fillStyle='#040104';ox.fill();
    // highlight
    ox.beginPath();ox.arc(ex-S*.04,ey-S*.04,S*.045,0,Math.PI*2);ox.fillStyle='rgba(255,255,255,.72)';ox.fill();
  });
  // Beak
  ox.strokeStyle='hsl(8,100%,62%)';ox.lineWidth=1.2;ox.lineCap='round';
  ox.beginPath();ox.moveTo(-S*.08,S*.27);ox.quadraticCurveTo(0,S*.4,S*.08,S*.27);ox.stroke();
  ox.beginPath();ox.moveTo(-S*.07,S*.29);ox.quadraticCurveTo(0,S*.19,S*.07,S*.29);ox.stroke();
}

const trail=[];
function upd(){
  fc++;o.hue=(o.hue+.8)%360;o.ph+=o.burst?.18:.065;
  if(!o.burst&&fc>=nxt){o.burst=true;o.bT=14+~~(Math.random()*10);dir();}
  if(o.burst&&--o.bT<=0){o.burst=false;nxt=fc+55+~~(Math.random()*85);dir();}
  let da=o.tAng-o.vx;da=((da%(Math.PI*2))+Math.PI*2)%(Math.PI*2);if(da>Math.PI)da-=Math.PI*2;
  o.x+=o.vx;o.y+=o.vy;
  let b=false;
  if(o.x<26){o.x=26;b=true;}if(o.x>OW-26){o.x=OW-26;b=true;}
  if(o.y<20){o.y=20;b=true;}if(o.y>OH-20){o.y=OH-20;b=true;}
  if(b||Math.random()<.01)dir();
  trail.push({x:o.x,y:o.y});if(trail.length>8)trail.shift();
}
function drw(){
  ox.clearRect(0,0,OW,OH);
  if(trail.length>1){
    for(let i=1;i<trail.length;i++){
      ox.strokeStyle=`hsla(${o.hue},100%,58%,${i/trail.length*.3})`;
      ox.lineWidth=i/trail.length*1.8;ox.lineCap='round';
      ox.beginPath();ox.moveTo(trail[i-1].x,trail[i-1].y);ox.lineTo(trail[i].x,trail[i].y);ox.stroke();
    }
  }
  ox.save();ox.translate(o.x,o.y);ox.rotate(o.tAng+Math.PI*.5);
  drawOcto();ox.restore();
}
let oL=0;
function loop(ts){requestAnimationFrame(loop);if(ts-oL<50||window.scrl||window.typ)return;oL=ts;upd();drw();}
requestAnimationFrame(loop);
})();
</script>
